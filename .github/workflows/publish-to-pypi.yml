name: Publish to PyPI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  publish:
    # Only run on merged PRs to main or direct pushes to main
    if: github.event_name == 'push' || (github.event.pull_request.merged == true && github.base_ref == 'main')

    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to create the GitHub release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Extract version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['tool']['poetry']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version to be published: $VERSION"

    - name: Check if version exists on PyPI
      id: check_version
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/geckoterminal-py/$VERSION/json/")
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already exists on PyPI"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION does not exist on PyPI, proceeding with publication"
        fi

    - name: Build package
      if: steps.check_version.outputs.exists == 'false'
      run: python -m build

    - name: Verify package contents
      if: steps.check_version.outputs.exists == 'false'
      run: |
        ls -la dist/
        python -m twine check dist/*

    - name: Publish to PyPI
      if: steps.check_version.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        print-hash: true
        verbose: true

    - name: Create GitHub Release
      if: steps.check_version.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: |
          🚀 **geckoterminal-py v${{ steps.get_version.outputs.version }}**

          Automatically published to PyPI.

          **Installation:**
          ```bash
          pip install geckoterminal-py==${{ steps.get_version.outputs.version }}
          ```
        draft: false
        prerelease: false

    - name: Skip publication
      if: steps.check_version.outputs.exists == 'true'
      run: |
        echo "Skipping publication - version ${{ steps.get_version.outputs.version }} already exists on PyPI"
